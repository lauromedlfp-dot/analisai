item.pageImages.length === 0 && item.text.trim().length < 50) {\n        item.status = 'error';\n        item.text = '';\n        showToast(`Não foi possível processar \"${file.name}\".`, 'error');\n      } else {\n        item.status = 'done';\n        if (item.qualityScore.level === 'baixa') {\n          showToast(`⚠ \"${file.name}\" tem qualidade de texto baixa. Considere \"Melhorar imagem\".`, 'error');\n        }\n      }\n    } catch (err) {\n      item.status = 'error';\n      item.text = '';\n      item.pageImages = [];\n      console.error('PDF erro:', err);\n      showToast(`Erro processando \"${file.name}\": ${err.message}`, 'error');\n    }\n\n    updatePdfUI();\n    updatePdfPreview();\n  }\n}\n\n// ============================================================\n// DETECÇÃO DE ROTAÇÃO PARA OCR\n// ============================================================\n// Testa as 4 orientações (0°, 90°, 180°, 270°) em baixa resolução\n// e retorna a que produz melhor reconhecimento (mais palavras + maior confiança).\n// Usado para corrigir PDFs escaneados em paisagem/de cabeça pra baixo.\nasync function detectBestRotation(page, worker) {\n  const ROTATIONS = [0, 90, 180, 270];\n  const TEST_SCALE = 0.9; // baixa resolução para velocidade\n  let best = { rotation: 0, score: -1, confidence: 0, words: 0 };\n\n  for (const rot of ROTATIONS) {\n    try {\n      const viewport = page.getViewport({ scale: TEST_SCALE, rotation: rot });\n      const canvas = document.createElement('canvas');\n      const ctx = canvas.getContext('2d');\n      canvas.width = viewport.width;\n      canvas.height = viewport.height;\n      await page.render({ canvasContext: ctx, viewport }).promise;\n\n      const dataUrl = canvas.toDataURL('image/png');\n      const { data } = await worker.recognize(dataUrl);\n\n      const text = (data.text || '').trim();\n      const wordCount = text.split(/\\s+/).filter(w => w.length >= 2).length;\n      const confidence = data.confidence || 0;\n      const score = wordCount * (confidence / 100);\n\n      console.log(`  ↻ ${rot}°: ${wordCount} palavras, confiança ${confidence.toFixed(1)}%, score ${score.toFixed(1)}`);\n\n      if (score > best.score) {\n        best = { rotation: rot, score, confidence, words: wordCount };\n      }\n\n      canvas.width = 0;\n      canvas.height = 0;\n    } catch (e) {\n      console.warn(`  ↻ ${rot}°: falhou —`, e.message);\n    }\n  }\n\n  return best.rotation;\n}\n\n// Detecta rotação para imagens (jpg/png) testando OCR em 4 orientações\nasync function detectImageRotation(imageUrl, worker) {\n  const img = await loadImage(imageUrl);\n  const ROTATIONS = [0, 90, 180, 270];\n  let best = { rotation: 0, score: -1 };\n\n  // Reduzir para velocidade\n  const maxDim = 800;\n  const ratio = Math.min(maxDim / img.width, maxDim / img.height, 1);\n\n  for (const rot of ROTATIONS) {\n    try {\n      const canvas = rotateImageOnCanvas(img, rot, ratio);\n      const dataUrl = canvas.toDataURL('image/png');\n      const { data } = await worker.recognize(dataUrl);\n\n      const text = (data.text || '').trim();\n      const wordCount = text.split(/\\s+/).filter(w => w.length >= 2).length;\n      const confidence = data.confidence || 0;\n      const score = wordCount * (confidence / 100);\n\n      console.log(`  ↻ img ${rot}°: ${wordCount} palavras, conf ${confidence.toFixed(1)}%, score ${score.toFixed(1)}`);\n\n      if (score > best.score) best = { rotation: rot, score };\n\n      canvas.width = 0;\n      canvas.height = 0;\n    } catch (e) {\n      console.warn(`  ↻ img ${rot}°: falhou —`, e.message);\n    }\n  }\n  return best.rotation;\n}\n\n// Rotaciona imagem em canvas e retorna o canvas pronto para OCR\nasync function rotateImageToCanvas(imageUrl, rotation) {\n  const img = await loadImage(imageUrl);\n  return rotateImageOnCanvas(img, rotation, 1.0);\n}\n\n// Helper: carrega imagem como elemento HTMLImageElement\nfunction loadImage(src) {\n  return new Promise((resolve, reject) => {\n    const img = new Image();\n    img.onload = () => resolve(img);\n    img.onerror = reject;\n    img.src = src;\n  });\n}\n\n// Helper: rotaciona imagem em canvas. ratio: fator de escala (1.0 = tamanho original)\nfunction rotateImageOnCanvas(img, rotation, ratio = 1.0) {\n  const w = img.width * ratio;\n  const h = img.height * ratio;\n  const canvas = document.createElement('canvas');\n  const ctx = canvas.getContext('2d');\n\n  if (rotation === 90 || rotation === 270) {\n    canvas.width = h;\n    canvas.height = w;\n  } else {\n    canvas.width = w;\n    canvas.height = h;\n  }\n\n  ctx.translate(canvas.width / 2, canvas.height / 2);\n  ctx.rotate((rotation * Math.PI) / 180);\n  ctx.drawImage(img, -w / 2, -h / 2, w, h);\n  return canvas;\n}\n\n// ============================================================\n// V21405-11: HEURÍSTICA DE QUALIDADE DE TEXTO + VISION SOB DEMANDA\n// ============================================================\nfunction assessTextQuality(text, numPages) {\n  if (!text || text.trim().length < 30) {\n    return { score: 0, level: 'baixa', issues: ['texto muito curto ou vazio'] };\n  }\n  const t = text;\n  const len = t.length;\n  const validChars = (t.match(/[A-Za-zÀ-ÿ0-9\\s.,;:\\/\\-\\+%<>≥≤()\\[\\]ºª°µ\\n]/g) || []).length;\n  const validRatio = validChars / len;\n  const digits = (t.match(/\\d/g) || []).length;\n  const digitDensity = digits / len;\n  const keywordRe = /\\b(RESULTADO|REFER[ÊE]NCIA|VALOR|MATERIAL|M[ÉE]TODO|COLETA|HEMOGLOBINA|HEMAT[ÓO]CRITO|LEUC[ÓO]CITOS|PLAQUETAS|GLICOSE|COLESTEROL|CREATININA|UREIA|HEMOGRAMA|SORO|PLASMA|mg\\/dL|mg\\/dl|g\\/dL|U\\/L|UI\\/L|ng\\/mL|mEq\\/L|TGO|TGP|TSH|HBA1C|HEPAT|ULTRASSON|RAIO[- ]?X|TOMOGRAFIA|RESSON)\\b/gi;\n  const keywordHits = (t.match(keywordRe) || []).length;\n\n  let score = 0;\n  score += validRatio * 0.4;\n  score += Math.min(digitDensity * 5, 0.3);\n  score += Math.min(keywordHits / 5, 0.3);\n\n  let level;\n  if (score < 0.40) level = 'baixa';\n  else if (score < 0.65) level = 'média';\n  else level = 'boa';\n\n  const issues = [];\n  if (validRatio < 0.85) issues.push(`alto % de caracteres estranhos (${((1-validRatio)*100).toFixed(0)}%)`);\n  if (keywordHits === 0) issues.push('nenhuma palavra-chave de exame encontrada');\n  if (digitDensity < 0.02) issues.push('densidade de números muito baixa');\n  if (numPages && text.length / numPages < 80) issues.push('pouquíssimo texto por página');\n\n  return { score, level, issues };\n}\n\nfunction estimateVisionTokens(pdfQ, imgQ) {\n  let pages = 0;\n  (pdfQ || []).forEach(f => { if (f.pageImages && f.pageImages.length) pages += f.pageImages.length; });\n  (imgQ || []).forEach(f => { if (f.dataUrl) pages += 1; });\n  return { pages, tokens: pages * 3300 };\n}\n\nfunction hasLowQuality(pdfQ, imgQ) {\n  return (pdfQ || []).some(f => f.qualityScore && f.qualityScore.level === 'baixa')\n      || (imgQ || []).some(f => f.qualityScore && f.qualityScore.level === 'baixa');\n}\n\nasync function enableVisionAndReprocess() {\n  const est = estimateVisionTokens(pdfQueue, imageQueue);\n  if (est.pages === 0) {\n    showToast('Anexe ao menos um PDF ou imagem antes de usar este modo.', 'error');\n    return;\n  }\n  const costUsd = (est.tokens / 1_000_000) * 15;\n  const confirmMsg = `Reprocessar com leitura visual (Claude Vision)?\\n\\n`\n    + `Arquivos: ${est.pages} página(s)/imagem(ns)\\n`\n    + `Custo estimado de tokens de entrada: ~${est.tokens.toLocaleString('pt-BR')} tokens\\n`\n    + `Custo aproximado: ~US$ ${costUsd.toFixed(3)} (apenas entrada, modelo Opus 4.1)\\n\\n`\n    + `Este modo é mais preciso para imagens de má qualidade, mas consome mais tokens.\\n\\n`\n    + `Continuar?`;\n  if (!confirm(confirmMsg)) return;\n  pdfQueue.forEach(f => { f.useVision = true; });\n  imageQueue.forEach(f => { f.useVision = true; });\n  showToast('Modo Vision ativado. Reprocessando...');\n  await processExams();\n}\n\n// // Worker global para Tesseract (reutilizável)\n\nlet tesseractWorker = null;\n\nasync function initTesseractWorker() {\n  if (!tesseractWorker) {\n    try {\n      const { createWorker } = Tesseract;\n      tesseractWorker = await createWorker('por');\n      console.log('✓ Tesseract worker inicializado');\n    } catch (err) {\n      console.error('Erro ao inicializar Tesseract:', err);\n      return false;\n    }\n  }\n  return true;\n}\n\nasync function handleImageFiles(files) {\n  const maxFiles = 10;\n  if (imageQueue.length + files.length > maxFiles) {\n    showToast(`Máximo ${maxFiles} imagens por vez`, 'error');\n    return;\n  }\n\n  // V21405-9: FASE 1 — anexa TODAS as imagens à fila imediatamente,\n  // depois processa uma a uma. Antes, awaits dentro do loop faziam parecer\n  // que só a primeira era anexada.\n  const pendingItems = [];\n  for (const file of files) {\n    if (!file.type.startsWith('image/')) {\n      showToast(`\"${file.name}\" não é imagem — ignorado`, 'error');\n      continue;\n    }\n    const item = { name: file.name, size: (file.size / 1024).toFixed(1), text: '', dataUrl: '', useVision: false, qualityScore: null, status: 'queued' };\n    imageQueue.push(item);\n    pendingItems.push({ file, item });\n  }\n  updateImageUI();\n  if (pendingItems.length === 0) return;\n\n  // FASE 2 — processa serialmente\n  for (const { file, item } of pendingItems) {\n    item.status = 'processing';\n    updateImageUI();\n    try {\n      // V21405-11: cache dataURL p/ vision sob demanda + Tesseract local como caminho padrão.\n      const dataUrl = await new Promise((resolve, reject) => {\n        const fr = new FileReader();\n        fr.onload = () => resolve(fr.result);\n        fr.onerror = () => reject(new Error('Falha ao ler arquivo'));\n        fr.readAsDataURL(file);\n      });\n      const resized = await resizeImageDataUrl(dataUrl, 1568, 0.82);\n      item.dataUrl = resized;\n\n      // OCR local com Tesseract (caminho barato padrão)\n      item.status = 'ocr';\n      updateImageUI();\n      const ok = await initTesseractWorker();\n      if (ok) {\n        try {\n          const r = await tesseractWorker.recognize(item.dataUrl);\n          item.text = (r.data?.text || '').trim();\n        } catch (e) {\n          console.warn('Tesseract erro:', e);\n          item.text = '';\n        }\n      }\n      item.qualityScore = assessTextQuality(item.text, 1);\n      console.log(`📊 Imagem \"${file.name}\" qualidade: ${item.qualityScore.level} (score ${item.qualityScore.score.toFixed(2)})`);\n      item.status = 'done';\n      if (item.qualityScore.level === 'baixa') {\n        showToast(`⚠ \"${file.name}\" tem qualidade de texto baixa. Considere \"Melhorar imagem\".`, 'error');\n      }\n    } catch (err) {\n      item.status = 'error';\n      console.error('Imagem erro:', err);\n      showToast(`Erro ao processar ${file.name}`, 'error');\n    }\n\n    updateImageUI();\n    updateImagePreview();\n  }\n}\n\n// V21405-4: helper para redimensionar imagem mantendo aspect ratio\nasync function resizeImageDataUrl(dataUrl, maxSide, quality) {\n  return new Promise((resolve, reject) => {\n    const img = new Image();\n    img.onload = () => {\n      const w = img.naturalWidth, h = img.naturalHeight;\n      const longSide = Math.max(w, h);\n      const scale = longSide > maxSide ? (maxSide / longSide) : 1;\n      const tw = Math.round(w * scale), th = Math.round(h * scale);\n      const canvas = document.createElement('canvas');\n      canvas.width = tw; canvas.height = th;\n      const ctx = canvas.getContext('2d');\n      ctx.fillStyle = '#ffffff';\n      ctx.fillRect(0, 0, tw, th);\n      ctx.drawImage(img, 0, 0, tw, th);\n      try {\n        resolve(canvas.toDataURL('image/jpeg', quality));\n      } catch (e) { reject(e); }\n      canvas.width = 0; canvas.height = 0;\n    };\n    img.onerror = () => reject(new Error('Falha ao decodificar imagem'));\n    img.src = dataUrl;\n  });\n}\n\nfunction updatePdfUI() {\n  document.getElementById('pdfCount').textContent = `${pdfQueue.length} arquivo(s)`;\n\n  const list = document.getElementById('pdfList');\n  list.innerHTML = pdfQueue.map((f, i) => `\n    <div class=\"file-item ${f.status}\">\n      <span class=\"status-icon\">${f.status === 'done' ? '✓' : f.status === 'error' ? '✗' : '⏳'}<\/span>\n      <span class=\"name\">${f.name}<\/span>\n      <span class=\"size\">${f.size} KB<\/span>\n      <button class=\"remove\" onclick=\"pdfQueue.splice(${i}, 1); updatePdfUI(); updatePdfPreview();\">✕<\/button>\n    <\/div>\n  `).join('');\n}\n\nfunction updateImageUI() {\n  document.getElementById('imageCount').textContent = `${imageQueue.length} imagem(ns)`;\n\n  const list = document.getElementById('imageList');\n  list.innerHTML = imageQueue.map((f, i) => `\n    <div class=\"file-item ${f.status}\">\n      <span class=\"status-icon\">${f.status === 'done' ? '✓' : f.status === 'error' ? '✗' : '⏳'}<\/span>\n      <span class=\"name\">${f.name}<\/span>\n      <span class=\"size\">${f.size} KB<\/span>\n      <button class=\"remove\" onclick=\"imageQueue.splice(${i}, 1); updateImageUI(); updateImagePreview();\">✕<\/button>\n    <\/div>\n  `).join('');\n}\n\nfunction updatePdfPreview() {\n  // V21405-10: prévia mostra TUDO que será enviado ao modelo (texto digital + nota de imagens)\n  const parts = pdfQueue\n    .filter(f => (f.text && f.text.trim().length) || (f.pageImages && f.pageImages.length))\n    .map(f => {\n      const hasTxt = !!(f.text && f.text.trim().length);\n      const hasImgs = !!(f.pageImages && f.pageImages.length);\n      let header = `--- ${f.name} ---`;\n      const notes = [];\n      if (hasImgs) notes.push(`${f.pageImages.length} página(s) será(ão) enviada(s) como IMAGEM (Claude Vision)`);\n      if (hasTxt) notes.push(`texto digital auxiliar: ${f.text.trim().length} chars`);\n      if (notes.length) header += `\\n[V21405-10] ${notes.join(' | ')}`;\n      const body = hasTxt ? f.text : '(PDF escaneado sem camada de texto — Claude lerá direto das imagens das páginas)';\n      return `${header}\\n${body}`;\n    })\n    .join('\\n\\n');\n  const trimmed = parts.trim();\n  const textarea = document.getElementById('pdfTextPreview');\n  const section = document.getElementById('pdfPreviewSection');\n\n  const hasFiles = pdfQueue.length > 0;\n  const hasContent = trimmed.length >= 10;\n\n  if (hasContent) {\n    textarea.value = parts;\n    section.style.display = 'flex';\n  } else if (hasFiles && pdfQueue.some(f => f.status === 'processing' || f.status === 'ocr')) {\n    textarea.value = '⏳ Rodando OCR/renderização (pode levar alguns segundos por página)...';\n    section.style.display = 'flex';\n  } else if (hasFiles && pdfQueue.every(f => f.status === 'error')) {\n    textarea.value = '⚠ Não foi possível processar. PDF pode estar protegido ou corrompido.';\n    section.style.display = 'flex';\n  } else {\n    section.style.display = 'none';\n  }\n}\n\nfunction updateImagePreview() {\n  const text = imageQueue\n    .filter(f => f.text)\n    .map(f => `--- ${f.name} ---\\n${f.text}`)\n    .join('\\n\\n');\n  const trimmed = text.trim();\n  const textarea = document.getElementById('imageTextPreview');\n  const section = document.getElementById('imagePreviewSection');\n\n  const hasFiles = imageQueue.length > 0;\n  const hasText = trimmed.length >= 10;\n\n  if (hasText) {\n    textarea.value = text;\n    section.style.display = 'flex';\n  } else if (hasFiles && imageQueue.some(f => f.status === 'processing')) {\n    textarea.value = '⏳ Rodando OCR nas imagens...';\n    section.style.display = 'flex';\n  } else if (hasFiles && imageQueue.every(f => f.status === 'error')) {\n    textarea.value = '⚠ Não foi possível extrair texto das imagens.';\n    section.style.display = 'flex';\n  } else {\n    section.style.display = 'none';\n  }\n}\n\nfunction clearPdfQueue() {\n  pdfQueue = [];\n  updatePdfUI();\n  updatePdfPreview();\n}\n\nfunction clearImageQueue() {\n  imageQueue = [];\n  updateImageUI();\n  updateImagePreview();\n}\n\nfunction switchTab(tab) {\n  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));\n  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));\n  \n  document.querySelector(`[onclick=\"switchTab('${tab}')\"]`).classList.add('active');\n  document.getElementById(tab + 'Tab').classList.add('active');\n\n  // Show/hide file queue sections below buttons based on active tab\n  const pdfSec = document.getElementById('pdfQueueSection');\n  const imgSec = document.getElementById('imageQueueSection');\n  if (pdfSec) pdfSec.style.display = (tab === 'pdf') ? 'block' : 'none';\n  if (imgSec) imgSec.style.display = (tab === 'image') ? 'block' : 'none';\n}\n\n// ============================================================\n// PROCESS EXAMS\n// ============================================================\n// V21405-4: monta o conteúdo da mensagem do usuário em formato multimodal.\n// Quando há PDFs com pageImages ou imagens com dataUrl, envia blocos image + text.\n// Caso contrário, envia uma única string de texto (compatibilidade).\nfunction buildMultimodalContent(userMessage, pdfQueue, imageQueue) {\n  // V21405-11: imagens só são enviadas à API quando item.useVision === true.\n  const hasVisionImages =\n    (pdfQueue && pdfQueue.some(f => f.useVision && f.pageImages && f.pageImages.length)) ||\n    (imageQueue && imageQueue.some(f => f.useVision && f.dataUrl));\n\n  if (!hasVisionImages) {\n    return userMessage;\n  }\n\n  function dataUrlToBlock(dataUrl) {\n    const m = /^data:([^;]+);base64,(.+)$/.exec(dataUrl);\n    if (!m) return null;\n    return {\n      type: 'image',\n      source: { type: 'base64', media_type: m[1], data: m[2] }\n    };\n  }\n\n  const blocks = [];\n  blocks.push({ type: 'text', text: userMessage });\n\n  // PDFs marcados para Vision\n  let pdfIdx = 0;\n  const totalPdfs = pdfQueue.filter(f => f.useVision && f.pageImages && f.pageImages.length).length;\n  for (const f of pdfQueue) {\n    if (!f.useVision) continue;\n    const hasImgs = f.pageImages && f.pageImages.length;\n    if (!hasImgs) continue;\n    pdfIdx++;\n    blocks.push({\n      type: 'text',\n      text: `\\n>>> Imagens das ${f.pageImages.length} página(s) do PDF ${pdfIdx} de ${totalPdfs} (${f.name}) — modo Vision:`\n    });\n    for (let pIdx = 0; pIdx < f.pageImages.length; pIdx++) {\n      blocks.push({ type: 'text', text: `--- PDF ${pdfIdx} | Página ${pIdx + 1} de ${f.pageImages.length} ---` });\n      const blk = dataUrlToBlock(f.pageImages[pIdx]);\n      if (blk) blocks.push(blk);\n    }\n  }\n\n  // Imagens marcadas para Vision\n  let imgIdx = 0;\n  const totalImgs = imageQueue.filter(f => f.useVision && f.dataUrl).length;\n  for (const f of imageQueue) {\n    if (!f.useVision || !f.dataUrl) continue;\n    imgIdx++;\n    blocks.push({ type: 'text', text: `\\n=== INÍCIO IMAGEM ${imgIdx} de ${totalImgs} | ARQUIVO: ${f.name} (modo Vision) ===` });\n    const blk = dataUrlToBlock(f.dataUrl);\n    if (blk) blocks.push(blk);\n    if (f.text && f.text.trim().length) {\n      blocks.push({ type: 'text', text: `[Texto auxiliar OCR]:\\n${f.text}` });\n    }\n    blocks.push({ type: 'text', text: `=== FIM IMAGEM ${imgIdx} ===\\n` });\n  }\n\n  return blocks;\n}\n\nasync function processExams() {\n  if (isProcessing) return;\n  if (!checkQuota()) return;\n\n  let inputText = '';\n  const textInput = document.getElementById('textInput').value.trim();\n\n  // PDFs: cada arquivo entra em um bloco separado com marcador de fronteira\n  // V21405-10: para PDFs com pageImages, o conteúdo VISUAL vai como image blocks em buildMultimodalContent.\n  // Aqui no inputText embutimos um aviso + texto digital auxiliar para o modelo correlacionar imagens com números.\n  const pdfTotal = pdfQueue.filter(p => (p.text && p.text.trim().length) || (p.pageImages && p.pageImages.length)).length;\n  const pdfBlocks = pdfQueue\n    .filter(f => (f.text && f.text.trim().length) || (f.pageImages && f.pageImages.length))\n    .map((f, i) => {\n      const hasImgs = !!(f.pageImages && f.pageImages.length);\n      const hasTxt = !!(f.text && f.text.trim().length);\n      const headerNote = hasImgs\n        ? `(${f.pageImages.length} página(s) anexada(s) como IMAGEM — leia diretamente das imagens; texto digital abaixo é auxiliar)`\n        : `(texto digital extraído por pdf.js)`;\n      const bodyText = hasTxt\n        ? f.text\n        : '[PDF escaneado sem camada de texto digital — use exclusivamente as imagens das páginas anexadas para extrair os exames]';\n      return `=== INÍCIO PDF ${i + 1} de ${pdfTotal} | ARQUIVO: ${f.name} ${headerNote} ===\\n${bodyText}\\n=== FIM PDF ${i + 1} ===`;\n    })\n    .join('\\n\\n');\n\n  // Imagens (OCR): cada uma também separada\n  const imageBlocks = imageQueue\n    .filter(f => f.text || f.dataUrl)\n    .map((f, i) => `=== INÍCIO IMAGEM ${i + 1} de ${imageQueue.filter(p => p.text || p.dataUrl).length} | ARQUIVO: ${f.name} ===\\n${f.text}\\n=== FIM IMAGEM ${i + 1} ===`)\n    .join('\\n\\n');\n\n  if (textInput) inputText += '=== TEXTO COLADO PELO USUÁRIO ===\\n' + textInput + '\\n=== FIM TEXTO COLADO ===\\n\\n';\n  if (pdfBlocks) inputText += pdfBlocks + '\\n\\n';\n  if (imageBlocks) inputText += imageBlocks + '\\n\\n';\n\n  // V21405-10: diagnóstico de consistência entre prévia e payload\n  try {\n    const _pdfWithText = pdfQueue.filter(f => f.text && f.text.trim().length).length;\n    const _pdfWithImgs = pdfQueue.filter(f => f.pageImages && f.pageImages.length).length;\n    const _totalImgs = pdfQueue.reduce((s, f) => s + ((f.pageImages && f.pageImages.length) || 0), 0)\n                     + imageQueue.filter(f => f.dataUrl).length;\n    console.log(`[V21405-10] processExams: pdf=${pdfQueue.length} (with text=${_pdfWithText}, with images=${_pdfWithImgs}), images=${imageQueue.length}, image blocks que irão p/ vision=${_totalImgs}`);\n  } catch(e) { console.warn('[V21405-10] log erro', e); }\n\n  // Bloqueio: se há arquivos na fila mas nenhum gerou texto, abortar para evitar alucinação\n  const pdfsWithText = pdfQueue.filter(f => (f.text && f.text.trim().length >= 50) || (f.pageImages && f.pageImages.length)).length;\n  const imgsWithText = imageQueue.filter(f => (f.text && f.text.trim().length >= 50) || !!f.dataUrl).length;\n  const totalQueued = pdfQueue.length + imageQueue.length;\n\n  if (totalQueued > 0 && pdfsWithText + imgsWithText === 0 && !textInput) {\n    showToast('Nenhum texto pôde ser extraído dos arquivos. Verifique se os PDFs/imagens têm conteúdo legível.', 'error');\n    return;\n  }\n\n  // Aviso: alguns arquivos estão em fila mas sem texto (ainda processando ou com falha)\n  const stillProcessing = pdfQueue.filter(f => f.status === 'processing' || f.status === 'ocr').length\n                        + imageQueue.filter(f => f.status === 'processing' || f.status === 'ocr').length;\n  if (stillProcessing > 0) {\n    showToast(`Aguarde: ${stillProcessing} arquivo(s) ainda em processamento.`, 'error');\n    return;\n  }\n\n  const failedFiles = pdfQueue.filter(f => f.status === 'error').length\n                    + imageQueue.filter(f => f.status === 'error').length;\n  if (failedFiles > 0) {\n    const proceed = confirm(`${failedFiles} arquivo(s) falharam ao extrair texto e serão IGNORADOS. Deseja continuar mesmo assim?`);\n    if (!proceed) return;\n  }\n\n  if (!inputText.trim()) {\n    showToast('Insira os exames (texto, PDF ou imagem)', 'error');\n    return;\n  }\n\n  // Layer 1: Regex\n  console.log('⏳ Layer 1: Anonimizando por regex...');\n  inputText = anonimizeLayer1(inputText);\n  console.log('✓ Layer 1: Concluído');\n\n  const totalFiles = pdfQueue.length + imageQueue.length;\n  const sourceDesc = [];\n  if (textInput) sourceDesc.push('texto');\n  if (pdfQueue.length) sourceDesc.push(`${pdfQueue.length} PDF(s)`);\n  if (imageQueue.length) sourceDesc.push(`${imageQueue.length} imagem(ns)`);\n\n  isProcessing = true;\n  const btn = document.getElementById('processBtn');\n  const spinner = document.getElementById('processSpinner');\n  const btnText = document.getElementById('processBtnText');\n  const processIcon = document.getElementById('processIcon');\n\n  btn.disabled = true;\n  spinner.style.display = 'inline-block';\n  processIcon.style.display = 'none';\n  btnText.textContent = `PROCESSANDO ${sourceDesc.join(' + ')}...`;\n  setStatus('Anonimizando dados (Layer 2 - IA)...');\n\n  const outputArea = document.getElementById('outputArea');\n  outputArea.innerHTML = `<div class=\"output-placeholder\">\n    <div style=\"width:32px;height:32px;border:3px solid rgba(29,78,216,0.3);border-top-color:#1d4ed8;border-radius:50%;animation:spin 0.8s linear infinite;\"><\/div>\n    <span>Verificando privacidade dos dados...<\/span>\n    <span style=\"font-size:11px;\">Processando com Sonnet 4.6 para detectar PII residual<\/span>\n  <\/div>`;\n\n  const model = 'claude-opus-4-1-20250805';\n\n  // Layer 2: Sonnet 4.6 (PII residual detection)\n  try {\n    console.log('⏳ Layer 2: Iniciando com Sonnet 4.6...');\n    inputText = await anonimizeLayer2(inputText);\n    console.log('✓ Layer 2 (Sonnet 4.6): Concluído');\n    setStatus('Enviando para análise com ' + model + '...');\n  } catch (err) {\n    console.error('Layer 2 erro:', err);\n    setStatus('Aviso: Layer 2 falhou, continuando...');\n  }\n\n  outputArea.innerHTML = `<div class=\"output-placeholder\">\n    <div style=\"width:32px;height:32px;border:3px solid rgba(29,78,216,0.3);border-top-color:#1d4ed8;border-radius:50%;animation:spin 0.8s linear infinite;\"><\/div>\n    <span>Analisando exames de ${sourceDesc.join(', ')}...<\/span>\n    <span style=\"font-size:11px;\">Dados anonimizados. Organizando com ${model}...<\/span>\n  <\/div>`;\n\n  const systemPrompt = `Você é especialista em organizar exames laboratoriais e de imagem para prontuários eletrônicos médicos.\n\n==============================================================\n⚠️ REGRA CRÍTICA Nº 1 — ANTI-ALUCINAÇÃO (PRIORIDADE MÁXIMA):\n==============================================================\n- TRANSCREVA APENAS o que está LITERALMENTE PRESENTE no texto fonte (texto colado, PDF extraído ou OCR de imagem).\n- Se um exame estiver ILEGÍVEL, parcialmente extraído, ou AUSENTE → OMITIR COMPLETAMENTE. NUNCA inventar, estimar, completar ou supor valores.\n- Se houver QUALQUER dúvida sobre um valor, OMITIR o exame inteiro. É preferível faltar exame a inventar dado.\n- NUNCA completar painéis: ter Hb não autoriza inventar Ht/Leuco/Plaq. Ter Crea não autoriza inventar U/AU.\n- Antes de transcrever cada valor, confirme mentalmente: \"este número está escrito no texto fonte?\". Se não estiver → OMITIR.\n- NUNCA interpolar valores entre datas. NUNCA usar valores de exames diferentes.\n- NUNCA preencher com \"--\", \"normal\", \"ausente\" ou placeholders.\n\n🔴 CHECKLIST OBRIGATÓRIO ANTES DE COLOCAR CADA VALOR NA SAÍDA:\n  1. Esta sigla aparece LITERALMENTE no texto fonte? (Ex.: \"TGO\", \"TRANSAMINASE OXALACETICA\", \"AST\")\n  2. Este número está ESCRITO no texto fonte ao lado dessa sigla?\n  3. Está na MESMA data de coleta do bloco que estou montando?\n  Se qualquer resposta for \"não tenho certeza\" → OMITIR o item.\n\n🔴 EXAMES QUE COSTUMAM SER ALUCINADOS (atenção redobrada — só inclua se LITERALMENTE presentes no texto):\n  GGT, FA, DHL, BB, Alb, B12, Vit D, Vit C, Folato, HbGlic, Ferro, Ferritina, AU, Ca, P, Mg, CPK, CKMB, Trop, BNP, INR, TTPa, Fibrinogênio, FAN, Anti-DNA, FR, VHS, HIV, VDRL, Hep.B, Hep.C, Chagas, PSA.\n  NÃO inclua nenhum desses se não estiverem escritos com seu valor numérico no texto fonte.\n\n==============================================================\n⚠️ REGRA CRÍTICA Nº 2 — FORMATAÇÃO DE OMISSÃO:\n==============================================================\n- NÃO escrever \"Linha 1:\", \"Linha 2:\", \"Linha 3:\" etc. nas saídas. PROIBIDO.\n- Se um exame não estiver presente no texto, OMITIR a sigla inteira (não escrever \"PCR:\", \"FR:\", \"Fibrinogênio:\" sem valor).\n- Se uma linha do formato laboratório não tiver NENHUM exame disponível, PULAR a linha completamente.\n- Manter a ORDEM das linhas conforme especificado no formato, mas omitir linhas vazias.\n\n==============================================================\n⚠️ REGRA CRÍTICA Nº 3 — INTERPRETAÇÃO DO TEXTO FONTE:\n==============================================================\n- LER com atenção literal. Não confundir valores entre exames próximos no layout (linhas adjacentes podem confundir).\n- Conferir UNIDADES e separadores decimais (vírgula/ponto) conforme texto fonte.\n- TABELA DE EQUIVALÊNCIAS (transcrever pela sigla padronizada):\n  • TRANSAMINASE OXALACETICA / AST / ASAT → TGO\n  • TRANSAMINASE PIRUVICA / ALT / ALAT → TGP\n  • POTASSIO → K\n  • SODIO → Na\n  • CREATININA → Crea\n  • UREIA → U\n  • COLESTEROL TOTAL → CT\n  • COLESTEROL HDL / HDL-COLESTEROL → HDL\n  • COLESTEROL LDL / LDL-COLESTEROL → LDL\n  • COLESTEROL VLDL → VLDL\n  • COLESTEROL NAO-HDL / NÃO-HDL → Não-HDL\n  • TRIGLICERIDES / TRIGLICERIDEOS → TGS\n  • HEMOGLOBINA → Hb\n  • HEMATOCRITO → Ht\n  • LEUCOCITOS → Leuco\n  • PLAQUETAS → Plaq\n  • GLICEMIA / GLICOSE → Glic\n  • HEMOGLOBINA GLICADA / HBA1C → HbGlic\n  • ACIDO URICO → AU\n  • ACIDO FOLICO / ÁCIDO FÓLICO / FOLATO SÉRICO → Folato\n  • VITAMINA B12 / COBALAMINA → B12\n  • 25-HIDROXIVITAMINA D / VITAMINA D / 25-OH VIT D → Vit D\n  • MICROALBUMINURIA → Microalbuminúria\n\n==============================================================\n⚠️ REGRA CRÍTICA Nº 4 — MÚLTIPLAS DATAS = MÚLTIPLOS BLOCOS:\n==============================================================\n- O input pode conter VÁRIOS PDFs/imagens delimitados por marcadores \"=== INÍCIO PDF X ===\" e \"=== FIM PDF X ===\". TRATE CADA UM SEPARADAMENTE.\n- Cada DATA DE COLETA distinta gera um BLOCO de saída separado:\n  \"LABORATÓRIO (DD/MM/AAAA): ...\"\n- Identifique a data de coleta procurando no texto: \"Data coleta:\", \"Data da coleta:\", \"Data Coleta:\" — esta é a data que vai no cabeçalho do bloco.\n- NÃO MISTURE valores de datas diferentes no mesmo bloco. Se um PDF tem hemograma de 17/04 e outro tem hemograma de 27/03 → DOIS blocos \"LABORATÓRIO\" separados.\n- Se o mesmo PDF contém múltiplas datas (ex.: gráficos históricos de evolução) → use APENAS a data de coleta atual indicada no cabeçalho de cada exame, IGNORE valores históricos dos gráficos de evolução.\n- Ordenação dos blocos: do mais recente para o mais antigo.\n- Para fezes/parasitológico/sangue oculto: criar bloco \"LABORATÓRIO (DD/MM/AAAA):\" com os achados.\n\nEXEMPLO DE SAÍDA com 3 PDFs de datas diferentes:\n\nLABORATÓRIO (17/04/2026):\n[apenas exames cuja data de coleta é 17/04/2026]\n\nLABORATÓRIO (16/04/2026):\n[apenas exames cuja data de coleta é 16/04/2026]\n\nLABORATÓRIO (27/03/2026):\n[apenas exames cuja data de coleta é 27/03/2026]\n\n==============================================================\nORDENAÇÃO DOS EXAMES (RIGOROSAMENTE NESTA ORDEM):\n==============================================================\n1. IMAGEM: RM → AngioRM → TC → PET/SPECT → USG → RX\n   - Anatomia: Crânio → Pescoço → Tórax → Abdome → MMSS → MMII\n   - Cronologia: mais recente → mais antigo\n2. NEUROLÓGICOS: ENMG → EEG → Potenciais Evocados (recente → antigo)\n3. CARDIOLÓGICOS: Holter → ECG → ECOTE → ECOTT → Doppler Carótidas/Vertebrais → Ergométrico → Tilt\n4. AUDIOMETRIA / OFTALMOLOGIA / OUTROS\n5. ANATOMOPATOLÓGICO (recente → antigo)\n6. LÍQUOR (recente → antigo)\n7. LABORATÓRIO (recente → antigo, agrupado por data)\n\n==============================================================\nFORMATO LABORATÓRIO (OMITIR LINHAS/EXAMES SEM VALOR):\n==============================================================\nCabeçalho: \"LABORATÓRIO (DD/MM/AAAA):\"\n\nOrdem das linhas (NÃO escrever \"Linha N:\", apenas os valores):\n1) Hb | Ht | Leuco | Plaq\n2) INR | TTPa | Fibrinogênio\n3) PCR | VHS | FR | FAN | Anti-DNA\n4) CPK | CKMB | Trop | BNP | pBNP\n5) Glic | HbGlic | CT | HDL | LDL | TGS\n6) Crea | U | Na | K | Mg | Ca | P | AU\n7) TGO | TGP | GGT | FA | DHL | BB(T/D/ Mono)\n3. Morfologia alterada: citar após Plaq\n4. FAN ≥ 1:180: mostrar padrão + positivos\n5. Hepatite B:\n   - Todos NR → \"Hep.B: NR\"\n   - Anti-HBS+ / HBS-Ag- / Anti-HBC- → \"Hep.B: Vacinado\"\n   - Outros padrões → descrever achados\n6. Urina I (UI): tudo normal → \"UI: Normal\" | senão → listar alterados\n7. Urocultura (UC): negativa → \"UC: Neg\" | positiva → \"UC: bactéria + sensíveis\"\n\n==============================================================\nFORMATAÇÃO DE SAÍDA:\n==============================================================\n- Valores FORA de referência: SIGLA E VALOR EM CAIXA ALTA.\n- Usar SIGLAS PADRONIZADAS (nunca nomes completos).\n- SEM MARKDOWN, SEM ASTERISCOS, APENAS TEXTO PURO.\n- Linguagem técnica, objetiva, adequada a prontuário.\n\n==============================================================\nPROIBIÇÕES ABSOLUTAS:\n==============================================================\n- NUNCA incluir: Nome, CPF, RG, Prontuário, Data Nasc, Lab, Endereço, Telefone, e-mail.\n- NUNCA escrever \"Linha 1:\", \"Linha 2:\" etc.\n- NUNCA inventar valores ausentes.\n- NUNCA armazenar dados.\n\n==============================================================\n⚠️ REGRA CRÍTICA Nº 5 — MARCAÇÃO DE VALORES FORA DA REFERÊNCIA:\n==============================================================\nPARA CADA VALOR LABORATORIAL transcrito, COMPARE com o intervalo de referência usando:\n\nPRIORIDADE 1 — Vr DO PRÓPRIO LAUDO:\n- O texto fonte normalmente traz \"Vr:\" ou \"Valor de Referência\" ao lado de cada exame.\n- Use esse Vr como verdade absoluta. Considere idade, sexo, contexto se especificado.\n\nPRIORIDADE 2 — TABELA DE FALLBACK (consenso entre fontes ABIM/ACCP/NBME/Medscape):\n- Use APENAS quando o laudo NÃO traz Vr explícito.\n- Tabela completa fornecida no final deste prompt.\n\nCOMO MARCAR:\n- Valor FORA do intervalo de referência → envolver SIGLA E VALOR juntos:\n    <span class=\"anormal\">SIGLA: VALOR<\/span>\n- Valor DENTRO do intervalo → escrever normalmente, sem tag:\n    SIGLA: VALOR\n- O conteúdo dentro de <span class=\"anormal\"> deve ser EXATAMENTE \"SIGLA: VALOR\" — sem unidades, sem pontuação extra.\n\nCRITÉRIOS PARA \"FORA DA REFERÊNCIA\":\n✓ Valor numérico abaixo do mínimo OU acima do máximo\n✓ Resultados qualitativos POSITIVOS quando o esperado é negativo (ex: NITRITO Positivo, ESTERASE LEUCOCITÁRIA ++)\n✓ Achados anormais em EAS/Urocultura (leucocitúria, hematúria, flora bacteriana > 200/uL)\n✓ HbA1c ≥ 5,7% (alto risco) ou ≥ 6,5% (DM)\n✓ Resultados sorológicos REAGENTES quando esperado é não-reagente\n✗ NÃO marcar valores limítrofes simples (ex: K=5,0 quando ref vai até 5,0 — está NO limite, dentro)\n✗ NÃO marcar nome do método, unidades, ou texto descritivo\n\nIMPORTANTE: a tag <span class=\"anormal\"> e <\/span> é a ÚNICA marcação HTML permitida na saída. Tudo o mais deve ser texto puro, sem markdown, sem asteriscos.\n\nEXEMPLO de saída correta para Glicemia=183 (ref: 70-99) e K=4,2 (ref: 3,5-5,0):\n<span class=\"anormal\">Glic: 183<\/span> | K: 4,2 |\n\nEXEMPLO de saída ERRADA:\n**Glic: 183** | K: 4,2 |   ← markdown não permitido\n<b>Glic: 183<\/b> | K: 4,2 |   ← tag b não permitida\n<span class=\"anormal\">Glic: 183 mg/dL<\/span>   ← unidade não vai dentro do span\n\n==============================================================\nTABELA DE VALORES DE REFERÊNCIA (FALLBACK — CONSENSO):\n==============================================================\nUse APENAS quando o laudo não traz Vr explícito. Fontes: ABIM Jan/2026, ACCP/PSAP, NBME Mar/2025, Medscape.\n\n[ELETRÓLITOS SÉRICOS]\nSódio (Na⁺): 136–145 mEq/L\nPotássio (K⁺): 3,5–5,0 mEq/L\nCloreto (Cl⁻): 96–106 mEq/L\nBicarbonato (HCO₃⁻): 22–28 mEq/L\nCálcio total: 8,4–10,2 mg/dL\nCálcio ionizado: 1,16–1,31 mmol/L\nMagnésio (Mg²⁺): 1,5–2,5 mg/dL\nFósforo inorgânico: 3,0–4,5 mg/dL\nÂnion Gap: 7–13 mEq/L\nOsmolalidade sérica: 275–295 mOsm/kg\n\n[FUNÇÃO RENAL]\nUreia / BUN: 8–20 mg/dL\nCreatinina sérica (geral): 0,6–1,2 mg/dL\nClearance de creatinina: 75 ncrementQuota();\n\n  } catch (err) {\n    outputArea.innerHTML = `<div style=\"color:var(--danger);padding:20px;\">\n      <strong>Erro ao processar:<\/strong><br><br>${err.message}<br><br>\n      <span style=\"color:var(--text-muted);font-size:12px;\">Verifique a conexão com a internet.<\/span>\n    <\/div>`;\n    setStatus('Erro: ' + err.message);\n    showToast('Erro ao processar exames', 'error');\n  } finally {\n    isProcessing = false;\n    btn.disabled = false;\n    spinner.style.display = 'none';\n    processIcon.style.display = 'inline';\n    btnText.textContent = 'PROCESSAR EXAMES';\n  }\n}\n\nfunction displayResult(text) {\n  const outputArea = document.getElementById('outputArea');\n  const outputMeta = document.getElementById('outputMeta');\n  const anonBadge = `<div class=\"anonimization-badge\">\n    <span>🔒<\/span>\n    <strong>Dados anonimizados em 2 camadas:<\/strong> Regex contextual + Sonnet (PII residual)\n  <\/div>`;\n\n  // V21405-11: banner amarelo quando qualidade baixa OU Claude sinalizar ilegibilidade.\n  const lowQuality = hasLowQuality(pdfQueue, imageQueue);\n  const respIndicatesIllegible =\n    /ileg[íi]vel|inconsistente|n[ãa]o\\s+p[oô]de\\s+ser\\s+lid[oa]|n[ãa]o\\s+foi\\s+poss[íi]vel\\s+ler|texto\\s+corrompido|extra[çc][ãa]o\\s+falhou/i.test(text || '');\n  const visionAlreadyUsed = pdfQueue.some(f => f.useVision) || imageQueue.some(f => f.useVision);\n\n  let warnBanner = '';\n  if ((lowQuality || respIndicatesIllegible) && !visionAlreadyUsed) {\n    const est = estimateVisionTokens(pdfQueue, imageQueue);\n    const motivo = respIndicatesIllegible\n      ? 'A IA indicou que parte do texto pode estar ilegível.'\n      : 'A heurística detectou texto de baixa qualidade na extração.';\n    warnBanner = `<div class=\"quality-banner\">\n      <div class=\"quality-banner-icon\">⚠<\/div>\n      <div class=\"quality-banner-body\">\n        <strong>Qualidade do texto extraído pode estar baixa.<\/strong><br>\n        <span class=\"quality-ban an>');\n  out = out.replace(/&lt;br\\s*\\/?&gt;/gi, '<br>');\n\n  return out;\n}\n\nfunction escapeHtml(text) {\n  const div = document.createElement('div');\n  div.textContent = text;\n  return div.innerHTML;\n}\n\nasync function copyResult() {\n  const outputArea = document.getElementById('outputArea');\n  // Usa o texto puro armazenado durante displayResult (sem tags <span>, sem badge)\n  const text = outputArea.dataset.plainText\n    || outputArea.textContent.replace(/^🔒.*?PII residual\\)\\s*/, '');\n\n  try {\n    await navigator.clipboard.writeText(text);\n    showToast('Copiado (texto puro, sem formatação) ✓');\n  } catch (_) {\n    const ta = document.createElement('textarea');\n    ta.value = text;\n    document.body.appendChild(ta);\n    ta.select();\n    document.execCommand('copy');\n    document.body.removeChild(ta);\n    showToast('Copiado ✓');\n  }\n}\n\n/**\n * Copia preservando formatação (negrito/vermelho/maior) — útil para colar em\n * Word, Google Docs ou outros editores que aceitam HTML.\n * No prontuário (texto puro), use copyResult() acima.\n */\nasync function copyResultRich() {\n  const outputArea = document.getElementById('outputArea');\n  const pre = outputArea.querySelector('pre');\n  if (!pre) { showToast('Nada para copiar', 'error'); return; }\n\n  // Substituir <span class=\"anormal\"> por estilo inline para sobreviver à cópia\n  const richHtml = pre.innerHTML.replace(\n    /<span class=\"anormal\">/gi,\n    '<span style=\"color:#c10007; font-weight:700; font-size:13pt;\">'\n  );\n\n  const plainText = outputArea.dataset.plainText || pre.textContent;\n\n  try {\n    if (navigator.clipboard && window.ClipboardItem) {\n      const blobHtml = new Blob([richHtml], { type: 'text/html' });\n      const blobText = new Blob([plainText], { type: 'text/plain' });\n      await navigator.clipboard.write([\n        new ClipboardItem({ 'text/html': blobHtml, 'text/plain': blobText })\n      ]);\n      showToast('Copiado com formatação ✓');\n    } else {\n      throw new Error('ClipboardItem indisponível');\n    }\n  } catch (e) {\n    // Fallback: copia só o texto puro\n    await navigator.clipboard.writeText(plainText);\n    showToast('Copiado (sem formatação — navegador antigo)');\n  }\n}\n\nfunction clearExams() {\n  const _pi = document.getElementById('pdfInput'); if (_pi) _pi.value = '';\n  const _ii = document.getElementById('imageInput'); if (_ii) _ii.value = '';\n\n  // Limpa apenas as entradas de exames (texto, PDFs, imagens), preservando o resultado já processado\n  document.getElementById('textInput').value = '';\n  pdfQueue = [];\n  imageQueue = [];\n  updatePdfUI();\n  updatePdfPreview();\n  updateImageUI();\n  updateImagePreview();\n  setStatus('Exames limpos');\n  showToast('Entradas de exames limpas');\n}\n\nfunction clearAll() {\n  const _pi = document.getElementById('pdfInput'); if (_pi) _pi.value = '';\n  const _ii = document.getElementById('imageInput'); if (_ii) _ii.value = '';\n\n  document.getElementById('textInput').value = '';\n  pdfQueue = [];\n  imageQueue = [];\n  updatePdfUI();\n  updatePdfPreview();\n  updateImageUI();\n  updateImagePreview();\n\n  const _meta = document.getElementById('outputMeta'); if (_meta) _meta.innerHTML = '';\n  const _ebox = document.getElementById('evolutionBox'); if (_ebox) _ebox.style.display = 'none';\n  document.getElementById('outputArea').innerHTML = `\n    <div class=\"output-placeholder\">\n      <div class=\"icon\">📋<\/div>\n      <span>Os exames organizados aparecerão aqui<\/span>\n      <span style=\"font-size:11px;\"><\/span>\n    <\/div>`;\n  document.getElementById('copyBtn').style.display = 'none';\n  document.getElementById('copyRichBtn').style.display = 'none';\n  document.getElementById('tokenCount').textContent = '';\n  const ac = document.getElementById('alteredCount');\n  if (ac) { ac.style.display = 'none'; ac.textContent = ''; }\n  setStatus('');\n}\n\nfunction setStatus(text) {\n  document.getElementById('statusText').textContent = text;\n}\n\nfunction showToast(msg, type = 'success') {\n  const toast = document.getElementById('toast');\n  toast.textContent = msg;\n  toast.style.background = type === 'error' ? 'var(--danger)' : 'var(--success)';\n  toast.classList.add('show');\n  setTimeout(() => toast.classList.remove('show'), 3000);\n}\n\n// ============================================================\n// INPUT HINT — overlay clicável com instruções\n// ============================================================\nfunction activateTextInput() {\n  const hint = document.getElementById('inputHint');\n  const input = document.getElementById('textInput');\n  if (hint) hint.classList.add('hidden');\n  if (input) {\n    input.focus();\n    // posiciona o cursor no final, se houver texto\n    const len = input.value.length;\n    try { input.setSelectionRange(len, len); } catch(_) {}\n  }\n}\nfunction maybeRestoreHint() {\n  const input = document.getElementById('textInput');\n  const hint = document.getElementById('inputHint');\n  if (!input || !hint) return;\n  if (!input.value.trim()) hint.classList.remove('hidden');\n}\n\n// ============================================================\n// GERAR TABELA DE EVOLUÇÃO (V31405-01)\n// ============================================================\n// Lista oficial de exames (ordem e siglas conforme template tabela_exames):\nconst EVOLUTION_EXAM_LIST = [\n  'Hb', 'Ht', 'Leuco', 'Plaq',\n  'INR', 'TTPa', 'Fibrinogênio',\n  'PCR', 'VHS',\n  'CPK', 'CKMB', 'Trop', 'BNP', 'pBNP',\n  'Glic', 'HbGlic',\n  'CT', 'HDL', 'LDL', 'TGS', 'Não HDL',\n  'Crea', 'U', 'Na', 'K', 'Mg', 'Ca', 'P', 'AU',\n  'TGO', 'TGP', 'GGT', 'FA', 'DHL', 'BB(T/D/I)', 'Alb',\n  'TSH', 'T4L', 'B12', 'Vit D', 'Folato', 'Outras Vitaminas',\n  'PSA(T/L)', 'UI', 'UC',\n  'Sorologias Infecciosas', 'Reumato', 'Níveis Séricos',\n  'Outros'\n];\n\nlet isGeneratingTable = false;\n\nasync function generateEvolutionTable() {\n  if (isGeneratingTable) return;\n  if (!checkQuota()) return;\n\n  // Fonte: texto puro do outputArea (resultado já organizado pela IA).\n  const outputArea = document.getElementById('outputArea');\n  let sourceText = outputArea?.dataset?.plainText || outputArea?.innerText || '';\n  sourceText = sourceText.trim();\n\n  if (!sourceText || sourceText.length < 50) {\n    showToast('Processe os exames primeiro (botão PROCESSAR EXAMES) para depois gerar a tabela.', 'error');\n    return;\n  }\n\n  isGeneratingTable = true;\n  const btn = document.getElementById('generateEvolutionBtn');\n  const originalLabel = btn.innerHTML;\n  btn.disabled = true;\n  btn.innerHTML = '⏳ GERANDO TABELA...';\n  setStatus('Gerando tabela de evolução...');\n\n  // V31405-02: a tabela é renderizada na evolutionBox SEM mexer no outputArea\n  const evolutionBox = document.getElementById('evolutionBox');\n  const evolutionScroll = document.getElementById('evolutionScroll');\n  evolutionBox.style.display = 'block';\n  evolutionScroll.innerHTML = `<div class=\"output-placeholder\" style=\"height:200px;\">\n    <div style=\"width:32px;height:32px;border:3px solid rgba(29,78,216,0.3);border-top-color:#1d4ed8;border-radius:50%;animation:spin 0.8s linear infinite;\"><\/div>\n    <span>Montando tabela de evolução dos exames...<\/span>\n    <span style=\"font-size:11px;\">Reorganizando por data e tipo de exame<\/span>\n  <\/div>`;\n\n  const examList = EVOLUTION_EXAM_LIST.join('\\n  - ');\n  const systemPrompt = `Você é especialista em organizar exames laboratoriais em tabela de evolução temporal.\n\nSua única tarefa: receber um TEXTO já organizado de exames (com blocos LABORATÓRIO (DD/MM/AAAA): ...) e produzir UMA tabela HTML evolutiva.\n\n==============================================================\nREGRAS ABSOLUTAS — ANTI-ALUCINAÇÃO:\n==============================================================\n- Transcreva APENAS valores LITERALMENTE presentes no texto fonte.\n- Se um exame não foi medido em determinada data → célula VAZIA (não inventar, não interpolar, não escrever \"—\" nem \"N/A\").\n- Se houver DÚVIDA sobre valor ou data → deixar célula VAZIA.\n- NUNCA criar datas que não existem no texto.\n- Manter unidades como aparecem no texto fonte (não converter).\n\n==============================================================\nESTRUTURA OBRIGATÓRIA DA TABELA:\n==============================================================\n- Tag raiz: <table class=\"evolution-table\">\n- Primeira coluna: cabeçalho \"EXAME\" e abaixo as linhas com siglas dos exames nesta ORDEM EXATA (omitir LINHAS inteiras se NENHUMA data tiver valor para aquele exame):\n  - ${examList}\n- Próximas colunas: uma por data encontrada no texto, ordenadas da MAIS ANTIGA (esquerda) para a MAIS RECENTE (direita). Cabeçalho com a data no formato DD/MM/AAAA.\n- Cada célula contém apenas o valor numérico + unidade quando relevante. Sem prosa.\n\n==============================================================\nLARGURA FIXA E QUEBRA DE TEXTO:\n==============================================================\n- A coluna EXAME tem 157px de largura, cada coluna de data tem 107px.\n- Conteúdo longo (listas de sorologias, reumato, níveis séricos etc.) DEVE ser quebrado em várias linhas usando <ul class=\"cell-list\"><li>...<\/li>...<\/ul> dentro da célula.\n- Se houver apenas UM item, não usar <ul> — texto solto na célula é suficiente.\n\n==============================================================\nREGRAS POR LINHA (exames compostos):\n==============================================================\n\n[UI — Urina I / EAS]\n- Indicar APENAS itens ALTERADOS dentre: número de Leucócitos, Nitrito, Esterase Leucocitária.\n- Se TODOS os três (Leucócitos, Nitrito, Esterase Leucocitária) estiverem dentro do valor de referência → escrever \"Normal\" na célula.\n- Marcar itens alterados com <span class=\"anormal\">...<\/span>.\n- Formato com múltiplos itens alterados:\n  <td><ul class=\"cell-list\"><li><span class=\"anormal\">Leuco: 25.000<\/span><\/li><li><span class=\"anormal\">Nitrito: positivo<\/span><\/li><\/ul><\/td>\n\n[Sorologias Infecciosas]\n- Enumerar APENAS se existirem sorologias para doenças infecciosas (HIV, VDRL, Hep B, Hep C, Sífilis, Chagas, HTLV, CMV, EBV, Toxo, Dengue, Zika etc.).\n- 1 por linha dentro de <ul class=\"cell-list\"><li>...<\/li><\/ul>.\n- Cada item no formato \"Doença: resultado\". Marcar positivos/reagentes com <span class=\"anormal\">...<\/span>.\n- Se nenhuma sorologia infecciosa foi feita em NENHUMA data → OMITIR a linha \"Sorologias Infecciosas\" inteira.\n\n[Reumato]\n- Enumerar APENAS se existirem resultados de provas reumatológicas (FAN, FR, Anti-DNA, Anti-CCP, Anti-Ro/SSA, Anti-La/SSB, Anti-Sm, Anti-RNP, ANCA, C3, C4, CH50 etc.).\n- 1 por linha em <ul class=\"cell-list\"><li>...<\/li><\/ul>. Formato \"Marcador: valor\".\n- Marcar valores anormais com <span class=\"anormal\">...<\/span>.\n- Se nenhuma prova reumatológica em nenhuma data → OMITIR a linha \"Reumato\" inteira.\n\n[Níveis Séricos]\n- Enumerar APENAS se existirem dosagens de níveis séricos de fármacos (Valproato, Fenitoína, Fenobarbital, Carbamazepina, Levetiracetam, Lacosamida, Lamotrigina, Topiramato, Lítio, Digoxina, Vancomicina, Aminofilina, Ciclosporina, Tacrolimus, Metotrexato etc.).\n- 1 por linha em <ul class=\"cell-list\"><li>...<\/li><\/ul>. Formato \"Fármaco: valor unidade\".\n- Marcar fora da faixa terapêutica com <span class=\"anormal\">...<\/span>.\n- Se nenhum nível sérico em nenhuma data → OMITIR a linha \"Níveis Séricos\" inteira.\n\n[Outros]\n- Enumerar outros exames NÃO citados nas linhas anteriores (ex.: amônia, lactato, ácido lático, troponina ultrassensível, NT-proBNP, etc. SE não couberem nas siglas existentes).\n- 1 por linha em <ul class=\"cell-list\"><li>...<\/li><\/ul>. Formato \"Exame: valor\".\n- Se não houver \"outros\" → OMITIR a linha \"Outros\".\n\n==============================================================\nMARCAÇÃO DE VALORES FORA DA REFERÊNCIA:\n==============================================================\n- Valores marcados no texto fonte com <span class=\"anormal\">...<\/span> devem ser preservados envolvendo o valor (ou item da lista) na célula.\n- Se o texto fonte não tiver marcação para algum valor, NÃO inventar marcação.\n\n==============================================================\nFORMATO DE SAÍDA:\n==============================================================\nRetorne APENAS o HTML da tabela (<table>...<\/table>), sem texto antes ou depois, sem markdown, sem <html>/<body>.\nUse <thead><tr><th>EXAME<\/th><th>DATA1<\/th>...<\/tr><\/thead><tbody><tr>...<\/tr><\/tbody>.\nLinha de exame com TODAS as células vazias deve ser COMPLETAMENTE OMITIDA.`;\n\n  const userMessage = `Texto fonte (resultado já organizado dos exames):\n\n${sourceText}\n\nGere a tabela conforme as regras.`;\n\n  try {\n    const response = await fetch('https://api.anthropic.com/v1/messages', {\n      method: 'POST',\n      headers: {\n        'Content-Type': 'application/json',\n        'x-api-key': API_KEY,\n        'anthropic-version': '2023-06-01',\n        'anthropic-dangerous-direct-browser-access': 'true'\n      },\n      body: JSON.stringify({\n        model: 'claude-opus-4-1-20250805',\n        max_tokens: 16384,\n        system: systemPrompt,\n        messages: [{ role: 'user', content: userMessage }]\n      })\n    });\n\n    if (!response.ok) {\n      const errData = await response.json().catch(() => ({}));\n      throw new Error(errData.error?.message || `Erro HTTP ${response.status}`);\n    }\n\n    const data = await response.json();\n    let tableHtml = data.content[0]?.text || '';\n    tableHtml = tableHtml.trim();\n    tableHtml = tableHtml.replace(/^```html\\s*/i, '').replace(/^```\\s*/, '').replace(/```\\s*$/, '');\n\n    const safeTable = sanitizeEvolutionTable(tableHtml);\n    if (!safeTable.includes('<table')) {\n      throw new Error('A IA não retornou uma tabela válida.');\n    }\n\n    evolutionScroll.innerHTML = safeTable;\n    evolutionScroll.dataset.tableHtml = safeTable;\n\n    // Atualizar tokens — somar aos atuais\n    const inputTokens = data.usage?.input_tokens || 0;\n    const outputTokens = data.usage?.output_tokens || 0;\n    const tcEl = document.getElementById('tokenCount');\n    const totalNow = inputTokens + outputTokens;\n    const existing = tcEl.textContent || '';\n    if (existing) {\n      tcEl.textContent = existing + ` | +${totalNow.toLocaleString('pt-BR')} (tabela)`;\n    } else {\n      tcEl.textContent = `Tokens: ${inputTokens.toLocaleString('pt-BR')} entrada | ${outputTokens.toLocaleString('pt-BR')} saida | ${totalNow.toLocaleString('pt-BR')} total`;\n    }\n\n    setStatus('Tabela de evolução gerada com sucesso');\n    showToast('Tabela de evolução pronta!');\n    incrementQuota();\n  } catch (err) {\n    console.error('generateEvolutionTable erro:', err);\n    evolutionScroll.innerHTML = `<div style=\"color:var(--danger);padding:20px;\">\n      <strong>Erro ao gerar tabela:<\/strong><br><br>${err.message}\n    <\/div>`;\n    setStatus('Erro: ' + err.message);\n    showToast('Erro ao gerar tabela: ' + err.message, 'error');\n  } finally {\n    isGeneratingTable = false;\n    btn.disabled = false;\n    btn.innerHTML = originalLabel;\n  }\n}\n\nfunction closeEvolutionTable() {\n  const evolutionBox = document.getElementById('evolutionBox');\n  const evolutionScroll = document.getElementById('evolutionScroll');\n  if (evolutionBox) evolutionBox.style.display = 'none';\n  if (evolutionScroll) {\n    evolutionScroll.innerHTML = '';\n    delete evolutionScroll.dataset.tableHtml;\n  }\n}\n\n// Sanitiza HTML da tabela permitindo apenas as tags whitelist.\nfunction sanitizeEvolutionTable(raw) {\n  if (!raw) return '';\n  const escapeMap = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '\"': '&quot;', \"'\": '&#39;' };\n  let out = raw.replace(/[&<>\"']/g, ch => escapeMap[ch]);\n  out = out.replace(/&lt;table(\\s+class=&quot;evolution-table&quot;)?&gt;/gi, '<table class=\"evolution-table\">');\n  out = out.replace(/&lt;\\/table&gt;/gi, '<\/table>');\n  out = out.replace(/&lt;thead&gt;/gi, '<thead>');\n  out = out.replace(/&lt;\\/thead&gt;/gi, '<\/thead>');\n  out = out.replace(/&lt;tbody&gt;/gi, '<tbody>');\n  out = out.replace(/&lt;\\/tbody&gt;/gi, '<\/tbody>');\n  out = out.replace(/&lt;tr&gt;/gi, '<tr>');\n  out = out.replace(/&lt;\\/tr&gt;/gi, '<\/tr>');\n  out = out.replace(/&lt;th(\\s+colspan=&quot;\\d+&quot;)?&gt;/gi, (m, g1) => g1 ? '<th colspan=\"' + g1.match(/\\d+/)[0] + '\">' : '<th>');\n  out = out.replace(/&lt;\\/th&gt;/gi, '<\/th>');\n  out = out.replace(/&lt;td(\\s+colspan=&quot;\\d+&quot;)?&gt;/gi, (m, g1) => g1 ? '<td colspan=\"' + g1.match(/\\d+/)[0] + '\">' : '<td>');\n  out = out.replace(/&lt;\\/td&gt;/gi, '<\/td>');\n  out = out.replace(/&lt;span class=&quot;anormal&quot;&gt;/gi, '<span class=\"anormal\">');\n  out = out.replace(/&lt;\\/span&gt;/gi, '<\/span>');\n  // V31405-03: permitir listas dentro de células\n  out = out.replace(/&lt;ul(\\s+class=&quot;cell-list&quot;)?&gt;/gi, '<ul class=\"cell-list\">');\n  out = out.replace(/&lt;\\/ul&gt;/gi, '<\/ul>');\n  out = out.replace(/&lt;li&gt;/gi, '<li>');\n  out = out.replace(/&lt;\\/li&gt;/gi, '<\/li>');\n  return out;\n}\n\nasync function copyEvolutionTable() {\n  const evolutionScroll = document.getElementById('evolutionScroll');\n  const tableHtml = evolutionScroll?.dataset?.tableHtml || evolutionScroll?.innerHTML || '';\n  const tableEl = evolutionScroll?.querySelector('table');\n  if (!tableEl) {\n    showToast('Nenhuma tabela para copiar.', 'error');\n    return;\n  }\n  const plain = Array.from(tableEl.querySelectorAll('tr')).map(tr =>\n    Array.from(tr.children).map(c => c.textContent.trim()).join('\\t')\n  ).join('\\n');\n  try {\n    if (navigator.clipboard && window.ClipboardItem) {\n      const item = new ClipboardItem({\n        'text/html': new Blob([tableHtml], { type: 'text/html' }),\n        'text/plain': new Blob([plain], { type: 'text/plain' })\n      });\n      await navigator.clipboard.write([item]);\n    } else {\n      await navigator.clipboard.writeText(plain);\n    }\n    showToast('Tabela copiada — pronto para colar no Word ✓');\n  } catch (e) {\n    console.error('copy table erro:', e);\n    try {\n      await navigator.clipboard.writeText(plain);\n      showToast('Tabela copiada como texto.');\n    } catch (e2) {\n      showToast('Não foi possível copiar.', 'error');\n    }\n  }\n}\n\nfunction downloadEvolutionTable() {\n  const evolutionScroll = document.getElementById('evolutionScroll');\n  const tableHtml = evolutionScroll?.dataset?.tableHtml || '';\n  if (!tableHtml) {\n    showToast('Nenhuma tabela para baixar.', 'error');\n    return;\n  }\n  // V31405-02: gerar arquivo .xls (HTML interpretado pelo Excel)\n  const html = `<html xmlns:o=\"urn:schemas-microsoft-com:office:office\" xmlns:x=\"urn:schemas-microsoft-com:office:excel\" xmlns=\"http://www.w3.org/TR/REC-html40\">\n<head>\n<meta charset=\"UTF-8\">\n<style>\n  table { border-collapse: collapse; font-family: Calibri, Arial, sans-serif; font-size: 11pt; }\n  th, td { border: 1px solid #999; padding: 4px 8px; text-align: center; }\n  th { background: #0c3eb1; color: #fff; font-weight: bold; }\n  td:first-child, th:first-child { text-align: left; background: #f1f5f9; font-weight: bold; }\n  .anormal { color: #c10007; font-weight: bold; }\n<\/style>\n<\/head>\n<body>\n${tableHtml}\n<\/body><\/html>`;\n  const blob = new Blob(['\\ufeff' + html], { type: 'application/vnd.ms-excel' });\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement('a');\n  a.href = url;\n  const now = new Date();\n  const ts = `${String(now.getDate()).padStart(2,'0')}-${String(now.getMonth()+1).padStart(2,'0')}-${now.getFullYear()}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;\n  a.download = `AnalisAI_tabela_evolucao_${ts}.xls`;\n  document.body.appendChild(a);\n  a.click();\n  document.body.removeChild(a);\n  setTimeout(() => URL.revokeObjectURL(url), 5000);\n  showToast('Tabela baixada (formato Excel).');\n}\n\nfunction restoreOrganizedView() {\n  // V31405-02: agora a tabela vive em sua própria caixa; \"voltar\" = fechar a caixa de tabela.\n  closeEvolutionTable();\n}\n\n// ============================================================\n// TEXT FORMATTING (B / I / U) — operates on outputArea selection\n// ============================================================\nfunction applyFormat(cmd) {\n  const out = document.getElementById('outputArea');\n  if (!out) return;\n  // Garante que o foco esteja na área editável para que execCommand funcione\n  if (document.activeElement !== out) {\n    out.focus();\n  }\n  try {\n    document.execCommand(cmd, false, null);\n  } catch (e) {\n    console.warn('Falha ao aplicar formatação:', e);\n  }\n  updateFormatButtons();\n}\n\nfunction updateFormatButtons() {\n  const map = { bold: 'ftBold', italic: 'ftItalic', underline: 'ftUnderline' };\n  for (const cmd in map) {\n    const btn = document.getElementById(map[cmd]);\n    if (!btn) continue;\n    let active = false;\n    try { active = document.queryCommandState(cmd); } catch (_) {}\n    btn.classList.toggle('active', active);\n  }\n}\n\n// Atalhos Ctrl+B / Ctrl+I / Ctrl+U dentro da área de resultado\ndocument.addEventListener('keydown', (e) => {\n  const out = document.getElementById('outputArea');\n  if (!out || document.activeElement !== out) return;\n  if (!(e.ctrlKey || e.metaKey)) return;\n  const k = e.key.toLowerCase();\n  if (k === 'b' || k === 'i' || k === 'u') {\n    e.preventDefault();\n    applyFormat(k === 'b' ? 'bold' : k === 'i' ? 'italic' : 'underline');\n  }\n});\n\n// Atualiza estado dos botões conforme a seleção muda\ndocument.addEventListener('selectionchange', () => {\n  const sel = document.getSelection();\n  if (!sel || !sel.anchorNode) return;\n  const out = document.getElementById('outputArea');\n  if (!out) return;\n  if (out.contains(sel.anchorNode)) updateFormatButtons();\n});\n<\/script>\n\n\n\n<style id=\"__om-edit-overrides\">\n#header :is(h1,h2,h3,h4,h5,h6) .wm-teal >:is(h1,h2,h3,h4,h5,h6,p,li,dt,dd,blockquote,figcaption,label,span,a,em,strong,small,td,th,caption) { font-size: 14px !important }\n\n/* V21405-8: scroll fixes */\nhtml, body { overflow-y: auto !important; height: auto !important; }\nbody { display: block !important; }\n.main { height: auto !important; min-height: calc(100vh - 60px) !important; }\n.panel, .panel-body { overflow: visible !important; }\n.panel-right { overflow: visible !important; }\n/* V31405-02: output-area com altura fixa + scroll vertical */\n.output-area { flex: 0 0 auto !important; height: 520px !important; min-height: 520px !important; max-height: 520px !important; overflow-y: auto !important; overflow-x: hidden !important; }\n<\/style>\n<\/body><\/html>"</script>
